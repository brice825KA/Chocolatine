name: Chocalatine Project
on:
  push:
    branches-ignore:
      - 'no-ga/**'
    pull_request:
      branches-ignore:
        - 'no-ga/**'

env:
  MIRROR_SSH_URL: "git@github.com:EpitechPGE1-2025/G-PSU-200-COT-2-1-minishell2-13.git"
  EXECUTABLES: "mysh"

jobs:
  check_compilation_and_coding_style:
    if: github.repository != 'EpitechPGE1-2025/G-PSU-200-COT-2-1-minishell2-13.git' 
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: check Coding Style
        run: banana-check-repo .

      - name: compile project
        run: make
        timeout-minutes: 2
        env:
        CC: epiclang

      - name: clean
        run: make clean
  
      - name: check executable
        run: |
            IFS=',' read -ra ADDR <<< "$EXECUTABLES"
              for i in "${ADDR[@]}"; do
                if [ ! -x "$i" ]; then
                  echo "::error file=$i::Executable $i not found or not executable"
                  exit 1
                 fi
               done

  run_tests:
    needs: check_compilation_and_coding_style
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
   
      - name: Run unit tests
        run: make tests_run
        timeout-minutes: 2

  push_to_mirror:
    runs-on: ubuntu-latest
    needs: run_tests
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: push mirror
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
